name: Build and Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Exact old-stable release tag to publish
        required: true
        default: v1.1.8
        type: string

env:
  IMAGE_NAME: ghcr.io/pi0n00r/nextcloud-mcp-server
  OLD_STABLE_TAG: v1.1.8
  OLD_STABLE_VERSION: 0.118.1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate exact old-stable tag
        run: |
          if [ "${{ inputs.tag }}" != "$OLD_STABLE_TAG" ]; then
            echo "This workflow only publishes $OLD_STABLE_TAG as an old-stable package." >&2
            exit 1
          fi

      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - name: Validate source version
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)
          if [ "$version" != "$OLD_STABLE_VERSION" ]; then
            echo "Expected pyproject version $OLD_STABLE_VERSION, found $version" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish exact old-stable image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.OLD_STABLE_TAG }}
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.source=https://github.com/pi0n00r/nextcloud-mcp-server
            org.opencontainers.image.url=https://github.com/pi0n00r/nextcloud-mcp-server/releases/tag/${{ env.OLD_STABLE_TAG }}
            org.opencontainers.image.version=${{ env.OLD_STABLE_TAG }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=nextcloud-mcp-server
            org.opencontainers.image.description=Old stable v1.1.8 package for nextcloud-mcp-server 0.118.1
