name: Release

on:
  push:
    tags:
      - v*
  workflow_call:
    inputs:
      tag:
        description: 'The tag to release (e.g. v0.70.2)'
        required: true
        type: string

jobs:
  # Mirrors docker-build-publish.yml: the tag comes from the workflow_call input
  # when bump-version.yml drives the release, and from the ref when a tag is
  # pushed by hand.
  resolve-tag:
    runs-on: ubuntu-latest
    # Branches on a string and never touches the token; scope it down explicitly
    # like the two jobs below rather than inheriting the caller's grant.
    permissions: {}
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  pypi:
    name: Publish to PyPI
    needs: resolve-tag
    runs-on: ubuntu-latest
    # Environment and permissions trusted publishing.
    environment:
      # Create this environment in the GitHub repository under Settings -> Environments
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: Install Python 3.11
        run: uv python install 3.11
      - name: Build
        run: uv build
      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl nextcloud-mcp-server --help
      - name: Smoke test (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz nextcloud-mcp-server --help
      - name: Publish
        run: uv publish

  github-release:
    name: Create GitHub Release
    # Gated on pypi: a Release announcing a version that failed to publish would
    # point users at an install that does not exist.
    needs: [resolve-tag, pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      # The bump commit that the tag points at is the one commitizen wrote the
      # CHANGELOG entry in, so the section is always present at this ref.
      - name: Build release notes
        env:
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail
          ./scripts/extract-changelog.sh "$TAG" > notes.md
          echo "Release notes for $TAG:"
          cat notes.md

      # `gh release create` fails if the release already exists (e.g. a re-run of
      # this job), so check first and update instead.
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; updating notes."
            gh release edit "$TAG" --notes-file notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file notes.md --verify-tag
          fi
