name: Pact contract tests

# Consumer-driven contract testing against the homelab-hosted Pact Broker
# (ADR-029). The broker is only reachable over Tailscale, so every job that
# talks to it first joins the tailnet with the shared github-runner OAuth
# client. Jobs no-op when the broker secrets are absent (e.g. on forks).
#
# Required repo/org secrets:
#   TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET  - Tailscale github-runner OAuth client
#   PACT_BROKER                           - broker base URL (https://pact-broker.internal.coutinho.io)
#   PACT_USERNAME / PACT_PASSWORD         - broker basic-auth credentials

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: pact-${{ github.ref }}
  cancel-in-progress: true

env:
  PACT_BROKER: ${{ secrets.PACT_BROKER }}
  PACT_USERNAME: ${{ secrets.PACT_USERNAME }}
  PACT_PASSWORD: ${{ secrets.PACT_PASSWORD }}

jobs:
  consumer:
    name: Consumer pacts (mcp -> astrolabe)
    runs-on: ubuntu-latest
    # Skip on forks / when broker is not configured.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Generate consumer pacts
        run: uv run pytest -v -m contract tests/contract/

      # Only publish from non-fork builds that have the broker secrets.
      - name: Join tailnet
        if: ${{ env.PACT_BROKER != '' }}
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-runner

      - name: Wait for Pact broker
        if: ${{ env.PACT_BROKER != '' }}
        run: .github/scripts/wait-for-pact-broker.sh

      - name: Install Pact CLI
        if: ${{ env.PACT_BROKER != '' }}
        run: |
          # Unified pact CLI (Rust, pact-foundation/pact-cli) — replaces the
          # deprecated pact-ruby-standalone `pact-broker` CLI (which only warns
          # now and is no longer maintained). The cargo-dist installer appends
          # its bin dir ($HOME/.pact/bin) to $GITHUB_PATH, so `pact` is on PATH
          # for the broker steps below.
          curl -fsSL https://github.com/pact-foundation/pact-cli/releases/download/v0.10.5/pact-installer.sh | sh
          echo "$HOME/.pact/bin" >> "$GITHUB_PATH"
          "$HOME/.pact/bin/pact" --help > /dev/null

      # Guard the migration: only `publish` runs on a PR (can-i-deploy is
      # master-only, record-deployment is tag-only), so assert here that the
      # unified CLI exposes every flag those steps pass. Dumps each --help so a
      # future flag rename is visible in the log, then fails fast if a flag the
      # workflows rely on is gone.
      - name: Verify pact broker CLI flags
        if: ${{ env.PACT_BROKER != '' }}
        run: |
          for sub in publish can-i-deploy record-deployment; do
            echo "::group::pact broker $sub --help"
            pact broker "$sub" --help
            echo "::endgroup::"
          done
          pact broker publish --help | grep -q -- '--consumer-app-version'
          pact broker publish --help | grep -q -- '--branch'
          pact broker can-i-deploy --help | grep -q -- '--to-environment'
          pact broker record-deployment --help | grep -q -- '--environment'

      - name: Publish pacts to broker
        if: ${{ env.PACT_BROKER != '' }}
        # Retried once, same rationale as provider verification: the probe above
        # closes the common case, but a blip landing between probe and call would
        # still fail the build for a network reason. Re-publishing identical pact
        # content under the same consumer version is idempotent in the broker.
        run: |
          publish() {
            pact broker publish tests/contract/pacts \
              --broker-base-url "$PACT_BROKER" \
              --broker-username "$PACT_USERNAME" \
              --broker-password "$PACT_PASSWORD" \
              --consumer-app-version "${{ github.sha }}" \
              --branch "${{ github.head_ref || github.ref_name }}"
          }
          publish && exit 0
          echo "::warning title=Retrying pact publish::First attempt failed; retrying once to rule out a transient broker/tailnet error."
          publish

  provider:
    name: Provider verification (astrolabe -> mcp)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # Stand up the MCP server. NOTE: single-user only exposes the *public*
      # management endpoints (/api/v1/status, /api/v1/vector-sync/status) — see
      # app.py:2248. The authenticated surface astrolabe also consumes
      # (/api/v1/search, /webhooks, /apps, /chunk-context, /pdf-preview) needs
      # an OAuth-capable profile (login-flow) plus Bearer-token injection into
      # the verifier (Verifier.add_custom_header). That is the phase-4 follow-up;
      # this job currently verifies the public-endpoint pacts.
      - name: Generate ephemeral TOKEN_ENCRYPTION_KEY
        run: |
          KEY=$(openssl rand -base64 32 | tr '+/' '-_')
          echo "TOKEN_ENCRYPTION_KEY=${KEY}" >> "$GITHUB_ENV"

      - name: Start MCP server
        uses: hoverkraft-tech/compose-action@11beaa1c2dae4e8ed7b1665aa074723b6cecb0e4 # v3.0.0
        with:
          compose-file: "./docker-compose.yml"
          compose-flags: "--profile single-user"
          up-flags: "--build"
        env:
          TOKEN_ENCRYPTION_KEY: ${{ env.TOKEN_ENCRYPTION_KEY }}

      - name: Wait for MCP server
        run: |
          for i in $(seq 1 30); do
            code=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8000/api/v1/status || true)
            [ "$code" = "200" ] && echo "ready" && exit 0
            sleep 5
          done
          docker compose --profile single-user logs mcp
          exit 1

      - name: Join tailnet
        if: ${{ env.PACT_BROKER != '' }}
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-runner

      - name: Wait for Pact broker
        if: ${{ env.PACT_BROKER != '' }}
        run: .github/scripts/wait-for-pact-broker.sh

      - name: Verify provider against broker pacts
        if: ${{ env.PACT_BROKER != '' }}
        env:
          PACT_PROVIDER_URL: http://localhost:8000
          PACT_PROVIDER_VERSION: ${{ github.sha }}
          PACT_PROVIDER_BRANCH: ${{ github.head_ref || github.ref_name }}
          # Publish results only from master so PR runs don't pollute the matrix.
          PACT_PUBLISH_RESULTS: ${{ github.ref == 'refs/heads/master' }}
        # Retried once: the probe above closes the common case, but a blip landing
        # between probe and verify would still red master for a network reason. A
        # genuine contract mismatch is deterministic and fails both attempts, so
        # the gate is preserved; publishing the same provider version twice is
        # idempotent in the broker.
        run: |
          uv run pytest -v -m contract tests/contract/test_mcp_provider_verification.py && exit 0
          echo "::warning title=Retrying provider verification::First attempt failed; retrying once to rule out a transient broker/tailnet error."
          uv run pytest -v -m contract tests/contract/test_mcp_provider_verification.py

  can-i-deploy:
    name: can-i-deploy
    runs-on: ubuntu-latest
    needs: [consumer, provider]
    # Only the `github` context is available in a job-level `if`, so the broker
    # guard lives on each step below (the pact CLI errors on an empty
    # --broker-base-url, e.g. after a secret rotation or on a fork).
    if: ${{ github.ref == 'refs/heads/master' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Join tailnet
        if: ${{ env.PACT_BROKER != '' }}
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-runner

      # Advisory only (continue-on-error): this job is deliberately non-blocking
      # (see the shadow-mode note below), so the probe must not become the one
      # step that fails it. Its value here is diagnostic — it separates "broker
      # unreachable" from a real incompatibility, which the shadow warning below
      # would otherwise misreport as the expected bootstrap gap.
      - name: Wait for Pact broker
        if: ${{ env.PACT_BROKER != '' }}
        continue-on-error: true
        run: .github/scripts/wait-for-pact-broker.sh

      - name: Install Pact CLI
        if: ${{ env.PACT_BROKER != '' }}
        run: |
          # Unified pact CLI (Rust, pact-foundation/pact-cli) — replaces the
          # deprecated pact-ruby-standalone `pact-broker` CLI (which only warns
          # now and is no longer maintained). The cargo-dist installer appends
          # its bin dir ($HOME/.pact/bin) to $GITHUB_PATH, so `pact` is on PATH
          # for the broker steps below.
          curl -fsSL https://github.com/pact-foundation/pact-cli/releases/download/v0.10.5/pact-installer.sh | sh
          echo "$HOME/.pact/bin" >> "$GITHUB_PATH"
          "$HOME/.pact/bin/pact" --help > /dev/null

      # SHADOW MODE: run can-i-deploy for signal but never fail the workflow.
      # The broker's `production` environment is populated by the
      # pact-record-deployment workflow on each repo's next release; until both
      # nextcloud-mcp-server AND astrolabe have recorded a prod deployment this
      # check cannot pass, so gating now would block every merge on a bootstrap
      # gap rather than a real incompatibility. Once it reports ✅ in both repos,
      # promote to a hard gate by removing the `set +e`/`exit 0` wrapper and
      # relocating it ahead of the deploy step (see card #325 follow-up).
      - name: Can I deploy nextcloud-mcp-server? (shadow — non-blocking)
        if: ${{ env.PACT_BROKER != '' }}
        run: |
          set +e
          pact broker can-i-deploy \
            --broker-base-url "$PACT_BROKER" \
            --broker-username "$PACT_USERNAME" \
            --broker-password "$PACT_PASSWORD" \
            --pacticipant nextcloud-mcp-server \
            --version "$GITHUB_SHA" \
            --to-environment production
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::warning title=can-i-deploy (shadow)::can-i-deploy exited $rc — NOT gating (shadow mode). Expected until both repos record a production deployment; see Deck card #325."
          else
            echo "can-i-deploy passed ✅ (shadow mode — not yet gating)"
          fi
          exit 0
