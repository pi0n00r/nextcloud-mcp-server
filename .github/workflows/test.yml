name: Tests

on:
  pull_request:
    branches:
      - master

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      - name: Check format
        run: uv run --frozen ruff format --diff
      - name: Linting
        run: uv run --frozen ruff check
      - name: Type check
        run: uv run --frozen ty check -- nextcloud_mcp_server

  unit-test:
    runs-on: ubuntu-latest
    needs: [linting]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      - name: Run unit tests
        run: uv run pytest -v -m unit -o "addopts=-p no:asyncio"

  # Cross-platform install smoke test. Installs the package (and its full
  # dependency closure) into an isolated environment and runs the CLI
  # entrypoint, which exercises the cli -> server -> webdav import chain. This is
  # the regression guard for #877, where a Unix-only ``import resource`` in that
  # chain crashed Windows startup. Runs on Windows in addition to Linux so any
  # platform-specific import regression fails here.
  package-smoke:
    needs: [linting]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: package-smoke (${{ matrix.os }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
      - name: Smoke test CLI (isolated install)
        run: uv run --isolated --no-project --with . nextcloud-mcp-server --help

  integration-test:
    runs-on: ubuntu-latest
    needs: [linting]
    strategy:
      fail-fast: false
      matrix:
        nextcloud_version:
          - "32"
          - "33"
          # - "34"  # Disabled until all upstream apps support NC 34
        mode:
          - "single-user"
          - "multi-user-basic"
          - "login-flow"
          - "keycloak"
          - "ldap"
        include:
          # Version-specific image pins — Renovate updates these via customManagers in renovate.json
          # Each entry is pinned to its major version (e.g., NC 32 only gets 32.x updates)
          - nextcloud_version: "32"
            nextcloud_image: "docker.io/library/nextcloud:32.0.12@sha256:607cce688a932f444926a902df979a21e83258746344ad23cd133b93088729c7"
          - nextcloud_version: "33"
            nextcloud_image: "docker.io/library/nextcloud:33.0.6@sha256:35170a1c67e759ef874eaa0fde74eb223cf221dacfb67a8ccc14e8d7c5f2c990"
          # Disabled until all upstream apps support NC 34
          # - nextcloud_version: "34"
          #   nextcloud_image: "docker.io/library/nextcloud:34.0.1@sha256:6444fc5450302534e850b4d23c05b5f06c7b0d25bd5ece716452061454699c58"

          # Mode-specific properties
          - mode: single-user
            profile: single-user
            markers: "(smoke and not keycloak and not login_flow and not multi_user_basic and not ldap) or (integration and not keycloak and not login_flow and not multi_user_basic and not ldap)"
            wait-port: 8000
            mcp-internal-url: "http://mcp:8000"
            needs-playwright: false
            # Also start GreenMail (SMTP/IMAP) so the Mail integration tests have
            # a real backend; the Mail account is provisioned in a step below.
            extra-compose-profiles: "--profile mail"
            extra-args: >-
              --ignore=tests/integration/test_qdrant_collection_creation.py
              --ignore=tests/rag_evaluation/

          - mode: multi-user-basic
            profile: multi-user-basic
            markers: "multi_user_basic"
            wait-port: 8003
            mcp-internal-url: "http://mcp-multi-user-basic:8000"
            needs-playwright: true
            extra-args: ""

          - mode: login-flow
            profile: login-flow
            markers: "login_flow"
            wait-port: 8004
            mcp-internal-url: "http://mcp-login-flow:8004"
            needs-playwright: true
            extra-args: ""

          - mode: keycloak
            profile: keycloak
            markers: "keycloak"
            wait-port: 8002
            mcp-internal-url: "http://mcp-keycloak:8002"
            needs-playwright: true
            extra-args: ""

          # LDAP-backend lane (GH #980 reproduction). Reuses the multi-user
          # BasicAuth MCP service (port 8003) and adds the `ldap` profile
          # (OpenLDAP). user_ldap is configured automatically by the app-hook
          # post-installation/15-setup-ldap-backend.sh. No browser needed.
          - mode: ldap
            profile: multi-user-basic
            extra-compose-profiles: "--profile ldap"
            markers: "ldap"
            wait-port: 8003
            mcp-internal-url: "http://mcp-multi-user-basic:8000"
            needs-playwright: false
            extra-args: ""

    name: integration (${{ matrix.mode }} / nc${{ matrix.nextcloud_version }})

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'true'

      - name: Set up PHP 8.4
        if: matrix.mode != 'single-user'
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: 8.4
          coverage: none

      # OIDC app installed from app store (dev mount removed from docker-compose.yml)

      - name: Set up Node.js
        if: matrix.mode != 'single-user'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      # OIDC app is now installed from the Nextcloud app store via app-hook
      # (third_party/oidc fork no longer mounted — upstream v1.16.3 fixes PR #631)
      # - name: Build OIDC app
      #   run: |
      #     cd third_party/oidc
      #     composer install --no-dev --optimize-autoloader
      #     npm ci
      #     npm run build

      # Generate an ephemeral Fernet key per CI run. docker-compose.yml
      # requires TOKEN_ENCRYPTION_KEY (PR #758 finding 5 removed the
      # hardcoded default), but the CI tokens.db is destroyed at the end of
      # the job so there is no value in persisting the key as a repo secret.
      # ``openssl rand -base64 32`` produces 32 bytes encoded as 44 base64
      # chars; ``tr '+/' '-_'`` converts to URL-safe base64, which is
      # exactly what Fernet expects.
      - name: Generate ephemeral TOKEN_ENCRYPTION_KEY
        run: |
          KEY=$(openssl rand -base64 32 | tr '+/' '-_')
          echo "TOKEN_ENCRYPTION_KEY=${KEY}" >> "$GITHUB_ENV"

      # Start services with the appropriate profile
      - name: Run docker compose
        uses: hoverkraft-tech/compose-action@11beaa1c2dae4e8ed7b1665aa074723b6cecb0e4 # v3.0.0
        with:
          compose-file: "./docker-compose.yml"
          compose-flags: "--profile ${{ matrix.profile }} ${{ matrix.extra-compose-profiles }}"
          up-flags: "--build"
        env:
          MCP_SERVER_URL: ${{ matrix.mcp-internal-url }}
          NEXTCLOUD_IMAGE: ${{ matrix.nextcloud_image }}
          # Inherited from $GITHUB_ENV via the previous step.
          TOKEN_ENCRYPTION_KEY: ${{ env.TOKEN_ENCRYPTION_KEY }}

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Install Playwright
        if: matrix.needs-playwright
        run: uv run playwright install chromium --with-deps

      # Wait for Nextcloud to be healthy
      - name: Wait for Nextcloud
        run: |
          echo "Waiting for Nextcloud at http://localhost:8080..."
          max_attempts=60
          attempt=0
          until curl -sSf http://localhost:8080/status.php 2>/dev/null | grep -q '"installed":true'; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "Nextcloud did not become ready in time."
              docker compose logs app
              exit 1
            fi
            echo "Attempt $attempt/$max_attempts: Not ready, sleeping 5s..."
            sleep 5
          done
          echo "Nextcloud is ready."

      # Provision a GreenMail-backed Mail account for the Mail integration tests
      # (single-user lane only; the `mail` profile started GreenMail above).
      - name: Provision GreenMail mail account
        if: matrix.mode == 'single-user'
        run: bash scripts/provision-greenmail-account.sh admin admin@example.org

      # Wait for the MCP service to be healthy
      - name: Wait for MCP service (${{ matrix.mode }})
        run: |
          echo "Waiting for MCP service on port ${{ matrix.wait-port }}..."
          max_attempts=30
          attempt=0
          until curl -o /dev/null -s -w "%{http_code}\n" http://localhost:${{ matrix.wait-port }}/health 2>/dev/null | grep -qE "200|404|405"; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "MCP service did not become ready in time."
              docker compose --profile ${{ matrix.profile }} logs
              exit 1
            fi
            echo "Attempt $attempt/$max_attempts: Not ready, sleeping 5s..."
            sleep 5
          done
          echo "MCP service is ready on port ${{ matrix.wait-port }}."

      # user_ldap is configured automatically by the app-hook
      # app-hooks/post-installation/15-setup-ldap-backend.sh (gated on the
      # openldap service). This step just surfaces the resulting config for
      # debugging, mirroring the keycloak verify step below.
      - name: Verify LDAP backend
        if: matrix.mode == 'ldap'
        run: |
          echo "=== user_ldap enabled? ==="
          docker compose exec -T app php occ app:list 2>/dev/null | grep -i ldap || echo "user_ldap NOT enabled"
          echo "=== user_ldap connection ==="
          # Re-derive the config id the same way the app-hook does, rather than
          # assuming s01, so the diagnostic stays accurate if discovery differs.
          config_id=$(docker compose exec -T app php occ ldap:show-config 2>/dev/null | grep -E '^\| Configuration' | grep -oE 's[0-9]+' | head -n1)
          docker compose exec -T app php occ ldap:test-config "${config_id:-s01}" 2>&1 || echo "ldap:test-config failed"

      - name: Wait for Keycloak
        if: matrix.mode == 'keycloak'
        run: |
          echo "Waiting for Keycloak realm at http://localhost:8888..."
          max_attempts=30
          attempt=0
          until curl -sf http://localhost:8888/realms/nextcloud-mcp > /dev/null 2>&1; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "Keycloak did not become ready in time."
              docker compose --profile keycloak logs keycloak
              exit 1
            fi
            echo "Attempt $attempt/$max_attempts: Not ready, sleeping 5s..."
            sleep 5
          done
          echo "Keycloak is ready."

      - name: Verify OIDC configuration
        if: matrix.mode == 'login-flow' || matrix.mode == 'keycloak'
        run: |
          echo "=== OIDC Discovery ==="
          curl -s http://localhost:8080/.well-known/openid-configuration | jq .
          echo "=== OIDC App Status ==="
          docker compose exec -T app php occ app:list --output=json 2>/dev/null | jq '.enabled.oidc // "NOT INSTALLED"'

      - name: Verify Keycloak realm
        if: matrix.mode == 'keycloak'
        run: |
          echo "=== Keycloak Realm Discovery ==="
          curl -s http://localhost:8888/realms/nextcloud-mcp/.well-known/openid-configuration | jq .
          echo "=== Keycloak Provider in Nextcloud ==="
          docker compose exec -T app php occ user_oidc:provider keycloak 2>/dev/null || echo "Provider not yet configured"

      - name: Run tests (${{ matrix.mode }})
        env:
          NEXTCLOUD_HOST: "http://localhost:8080"
          NEXTCLOUD_USERNAME: "admin"
          NEXTCLOUD_PASSWORD: "admin"
        run: |
          uv run pytest -v \
            --log-cli-level=WARN \
            -m '${{ matrix.markers }}' \
            -o "addopts=-p no:asyncio" \
            --timeout=300 \
            ${{ matrix.extra-args }}

      - name: Collect service logs on failure
        if: failure()
        run: |
          docker compose --profile ${{ matrix.profile }} ${{ matrix.extra-compose-profiles }} logs --tail=500 > /tmp/docker-compose-logs.txt 2>&1
          docker compose exec -T app cat /var/www/html/data/nextcloud.log 2>/dev/null | tail -100 > /tmp/nextcloud-app.log 2>&1 || true

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-${{ matrix.mode }}-nc${{ matrix.nextcloud_version }}
          path: |
            /tmp/*.png
            /tmp/docker-compose-logs.txt
            /tmp/nextcloud-app.log
          retention-days: 7
          if-no-files-found: ignore

  # Docling OCR backend lane (ADR-031). Starts the single-user MCP service plus
  # the docker-compose `docling` profile (docling-serve-cpu container) and runs
  # the gated `-m docling` suite: an image auto-routes to docling and its text is
  # OCR'd back out, a text-layer PDF is force-parsed, and an unknown forced
  # processor errors cleanly. Kept as its own job (not a matrix mode) because the
  # docling-serve-cpu image is large, CPU OCR is slow, and it needs no Nextcloud
  # version matrix — a single NC image (the compose default) is enough.
  docling-integration:
    name: integration (docling)
    runs-on: ubuntu-latest
    needs: [linting]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # docker-compose.yml requires TOKEN_ENCRYPTION_KEY; generate an ephemeral
      # one (the CI tokens.db is destroyed with the job). See the integration job.
      - name: Generate ephemeral TOKEN_ENCRYPTION_KEY
        run: |
          KEY=$(openssl rand -base64 32 | tr '+/' '-_')
          echo "TOKEN_ENCRYPTION_KEY=${KEY}" >> "$GITHUB_ENV"

      - name: Run docker compose (single-user + docling)
        uses: hoverkraft-tech/compose-action@11beaa1c2dae4e8ed7b1665aa074723b6cecb0e4 # v3.0.0
        with:
          compose-file: "./docker-compose.yml"
          compose-flags: "--profile single-user --profile docling"
          up-flags: "--build"
        env:
          TOKEN_ENCRYPTION_KEY: ${{ env.TOKEN_ENCRYPTION_KEY }}
          # Master switch: without it initialize_document_processors() no-ops and
          # docling never registers on the webdav read_file path.
          ENABLE_DOCUMENT_PROCESSING: "true"
          # Enable the docling backend in the single-user mcp service and point it
          # at the docling-serve container on the compose network.
          ENABLE_DOCLING: "true"
          DOCLING_API_URL: "http://docling:5001"
          # CPU OCR is slow; give the sync convert call generous headroom.
          DOCLING_TIMEOUT: "300"

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Wait for Nextcloud
        run: |
          echo "Waiting for Nextcloud at http://localhost:8080..."
          max_attempts=60
          attempt=0
          until curl -sSf http://localhost:8080/status.php 2>/dev/null | grep -q '"installed":true'; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "Nextcloud did not become ready in time."
              docker compose logs app
              exit 1
            fi
            echo "Attempt $attempt/$max_attempts: Not ready, sleeping 5s..."
            sleep 5
          done
          echo "Nextcloud is ready."

      - name: Wait for docling-serve
        run: |
          echo "Waiting for docling-serve /health on http://localhost:5001..."
          max_attempts=60
          attempt=0
          until curl -sf http://localhost:5001/health > /dev/null 2>&1; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "docling-serve did not become ready in time."
              docker compose --profile docling logs docling
              exit 1
            fi
            echo "Attempt $attempt/$max_attempts: Not ready, sleeping 5s..."
            sleep 5
          done
          echo "docling-serve is ready."

      - name: Wait for MCP service (single-user)
        run: |
          echo "Waiting for MCP service on port 8000..."
          max_attempts=30
          attempt=0
          until curl -o /dev/null -s -w "%{http_code}\n" http://localhost:8000/health 2>/dev/null | grep -qE "200|404|405"; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "MCP service did not become ready in time."
              docker compose --profile single-user logs mcp
              exit 1
            fi
            echo "Attempt $attempt/$max_attempts: Not ready, sleeping 5s..."
            sleep 5
          done
          echo "MCP service is ready on port 8000."

      - name: Run docling tests
        env:
          NEXTCLOUD_HOST: "http://localhost:8080"
          NEXTCLOUD_USERNAME: "admin"
          NEXTCLOUD_PASSWORD: "admin"
          # Selects the skipif-gated assertions in tests/integration/test_docling_api.py.
          ENABLE_DOCLING: "true"
        run: |
          uv run pytest -v \
            --log-cli-level=WARN \
            -m docling \
            -o "addopts=-p no:asyncio" \
            --timeout=600

      - name: Collect service logs on failure
        if: failure()
        run: |
          docker compose --profile single-user --profile docling logs --tail=500 > /tmp/docker-compose-logs.txt 2>&1
          docker compose exec -T app cat /var/www/html/data/nextcloud.log 2>/dev/null | tail -100 > /tmp/nextcloud-app.log 2>&1 || true

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-docling
          path: |
            /tmp/docker-compose-logs.txt
            /tmp/nextcloud-app.log
          retention-days: 7
          if-no-files-found: ignore
